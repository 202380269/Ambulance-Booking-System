<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="auth-container">
    <h2>🚑 Register</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn">Create Account</button>
    </form>

    <p>Already have an account? <a href="/login/">Login</a></p>
</div>

</body>
</html>
