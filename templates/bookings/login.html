<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="auth-container">
    <h2>🚑 Login</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn">Login</button>
    </form>

    <p>No account? <a href="/register/">Register</a></p>
</div>

</body>
</html>
